---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetris-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tetris-v2
  template:
    metadata:
      labels:
        app: tetris-v2
    spec:
      containers:
      - name: tetris-v2
        image: 747426/tetrisv2:1
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: tetris-v2-service
spec:
  selector:
    app: tetris-v2
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
  